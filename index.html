<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client List</title>

<style>
body{
  font-family:Arial;
  background:#f2f4f8;
  padding:15px;
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

a{
  text-decoration:none;
}

.btn{
  padding:10px 15px;
  background:#4CAF50;
  color:white;
  border-radius:20px;
}

.client{
  background:#fff;
  padding:12px;
  border-radius:8px;
  margin-top:10px;
  cursor:pointer;
}
</style>

</head>

<body>

<div class="top">
  <h2>Clients</h2>
  <a href="addclient.html" class="btn">+ Add Client</a>
</div>

<div id="list"></div>

<script>

// load data
let clients = JSON.parse(localStorage.getItem("clients") || "[]");

function showClients(){
  let div = document.getElementById("list");
  div.innerHTML = "";

  clients.forEach((c,index)=>{
    div.innerHTML += `
      <div class="client" onclick="openGame(${index})">
        <b>${c.name}</b><br>
        Commission: ${c.commission}%<br>
        Patti: ${c.patti}%
      </div>
    `;
  });
}

function openGame(i){
  localStorage.setItem("activeClient", i);
  window.location.href = "game.html";
}

showClients();

</script>

</body>
</html>
