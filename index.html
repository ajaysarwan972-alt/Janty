<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel App</title>

<style>
body{
  font-family:Arial;
  background:#f2f4f8;
  padding:10px;
}

/* 00-99 GRID */
.grid99{
  display:grid;
  grid-template-columns: repeat(10, 1fr);
  gap:5px;
}

.box{
  background:#fff;
  border-radius:6px;
  padding:5px;
  text-align:center;
  font-size:12px;
}

.box input{
  width:100%;
  border:none;
  text-align:center;
}

/* A B GRID */
.gridAB{
  display:grid;
  grid-template-columns: repeat(5, 1fr);
  gap:8px;
  margin-top:10px;
}

input, textarea{
  width:100%;
  padding:10px;
  margin-top:5px;
  border-radius:8px;
  border:1px solid #ccc;
}

.btn{
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:20px;
  width:100%;
  font-weight:bold;
}

.green{background:#4CAF50;color:#fff;}
.blue{background:#3498db;color:#fff;}
.red{background:#e74c3c;color:#fff;}

h3{margin-top:15px;}
</style>

</head>

<body>

<h3>00 - 99 Panel</h3>
<div class="grid99" id="panel"></div>

<h3>A (Andar)</h3>
<div class="gridAB" id="andar"></div>

<h3>B (Bahar)</h3>
<div class="gridAB" id="bahar"></div>

<h3>Total ₹: <span id="total">0</span></h3>

<!-- ENTRY PANEL -->
<h3>Entry Panel</h3>

<input id="numbers" placeholder="Enter Numbers (ex: 05 12 25)">
<input id="amount" type="number" placeholder="Amount">

<label><input type="checkbox" id="isA"> A (Andar)</label>
<label><input type="checkbox" id="isB"> B (Bahar)</label>

<button class="btn green" onclick="setEntry()">Set</button>

<textarea id="code" placeholder="Code yaha ayega"></textarea>

<button class="btn blue" onclick="generate()">Generate Code</button>
<button class="btn blue" onclick="copyCode()">Copy Code</button>
<button class="btn red" onclick="clearAll()">Clear</button>

<script>

// 00-99 grid
for(let i=0;i<100;i++){
  let num = i.toString().padStart(2,'0');
  document.getElementById("panel").innerHTML += `
    <div class="box">
      ${num}
      <input type="number" oninput="calc()">
    </div>
  `;
}

// A/B
let nums=[1,2,3,4,5,6,7,8,9,0];

function createAB(id){
  nums.forEach(n=>{
    document.getElementById(id).innerHTML += `
      <div class="box">
        ${n}
        <input type="number" oninput="calc()">
      </div>
    `;
  });
}

createAB("andar");
createAB("bahar");

// total
function calc(){
  let total=0;
  document.querySelectorAll("input[type=number]").forEach(i=>{
    total += Number(i.value||0);
  });
  document.getElementById("total").innerText = total;
}

// ENTRY SYSTEM
function setEntry(){

  let numsInput = document.getElementById("numbers").value.trim().split(" ");
  let amt = document.getElementById("amount").value;

  if(!amt) return alert("Amount dal");

  // 00-99
  document.querySelectorAll("#panel .box").forEach((b,i)=>{
    let num=i.toString().padStart(2,'0');
    if(numsInput.includes(num)){
      b.querySelector("input").value = amt;
    }
  });

  // A
  if(document.getElementById("isA").checked){
    document.querySelectorAll("#andar .box").forEach((b,i)=>{
      let n = nums[i];
      if(numsInput.includes(String(n))){
        b.querySelector("input").value = amt;
      }
    });
  }

  // B
  if(document.getElementById("isB").checked){
    document.querySelectorAll("#bahar .box").forEach((b,i)=>{
      let n = nums[i];
      if(numsInput.includes(String(n))){
        b.querySelector("input").value = amt;
      }
    });
  }

  calc();
}

// GENERATE CODE
function generate(){
  let data=[];

  // 00-99
  document.querySelectorAll("#panel .box").forEach((b,i)=>{
    let val=b.querySelector("input").value;
    if(val){
      let num=i.toString().padStart(2,'0');
      data.push(num+"-"+val);
    }
  });

  // A
  document.querySelectorAll("#andar .box").forEach((b,i)=>{
    let val=b.querySelector("input").value;
    if(val) data.push("A"+nums[i]+"-"+val);
  });

  // B
  document.querySelectorAll("#bahar .box").forEach((b,i)=>{
    let val=b.querySelector("input").value;
    if(val) data.push("B"+nums[i]+"-"+val);
  });

  document.getElementById("code").value = data.join(",");
}

// COPY
function copyCode(){
  let t=document.getElementById("code");
  t.select();
  document.execCommand("copy");
  alert("Copied");
}

// CLEAR
function clearAll(){
  document.querySelectorAll("input[type=number]").forEach(i=>i.value="");
  document.getElementById("code").value="";
  calc();
}

</script>

</body>
  </html>
