<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family:Arial;
  background:#f2f4f8;
  padding:10px;
}

/* 00-99 GRID */
.grid99{
  display:grid;
  grid-template-columns: repeat(10,1fr);
  gap:5px;
  margin-bottom:10px;
}

/* BOX */
.box{
  background:#fff;
  border-radius:6px;
  padding:5px;
  text-align:center;
  font-size:12px;
}

.box .val{
  margin-top:3px;
  font-weight:bold;
}

/* SECTION */
.section{
  background:#fff;
  padding:10px;
  border-radius:8px;
  margin-bottom:10px;
}

/* INPUT */
input{
  width:100%;
  padding:8px;
  margin-top:5px;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:10px;
  margin-top:10px;
  background:green;
  color:#fff;
  border:none;
  border-radius:6px;
}

/* A/B ROW FIX */
.abRow{
  display:grid;
  grid-template-columns: repeat(10,1fr);
  gap:5px;
  margin-bottom:10px;
}

/* TOTAL */
.total{
  font-size:18px;
  font-weight:bold;
  margin-top:10px;
}
</style>
</head>

<body>

<!-- 🔥 00–99 TOP GRID -->
<h3>00 - 99</h3>
<div class="grid99" id="panel"></div>

<!-- 🔵 A / B (FIXED ROW) -->
<div class="section">
<h3>A (0–9)</h3>
<div id="aBox" class="abRow"></div>

<h3>B (0–9)</h3>
<div id="bBox" class="abRow"></div>

<div class="total">Total: ₹<span id="total">0</span></div>
</div>

<!-- 🟡 JODI INPUT -->
<div class="section">
<h3>JODI INPUT</h3>
<input id="jodiNums" placeholder="05 12 33">
<input id="jodiAmt" type="number" placeholder="Amount">
<button onclick="addJodi()">ADD JODI</button>
</div>

<!-- 🔴 CROSSING -->
<div class="section">
<h3>CROSSING</h3>
<input id="n1" placeholder="Number 1">
<input id="n2" placeholder="Number 2">

<label>
<input type="checkbox" id="nojodi"> WITHOUT JODI
</label>

<input id="crossAmt" type="number" placeholder="Amount">
<button onclick="generateCross()">GENERATE CROSS</button>
</div>

<script>

let data = {};

// 🔥 00–99 GRID
for(let i=0;i<100;i++){
let num = i.toString().padStart(2,'0');

panel.innerHTML += `
<div class="box" id="b${num}">
${num}
<div class="val">0</div>
</div>`;
}

// 🔵 A/B ROW
for(let i=0;i<10;i++){

aBox.innerHTML += `
<div class="box">
A ${i}
<input oninput="setVal('A'+${i},this.value)">
</div>`;

bBox.innerHTML += `
<div class="box">
B ${i}
<input oninput="setVal('B'+${i},this.value)">
</div>`;
}

// 🔵 SET VALUE
function setVal(num,val){
val=Number(val)||0;
data[num]=val;
update();
}

// 🟡 JODI
function addJodi(){
let nums = jodiNums.value.trim().split(" ");
let amt = Number(jodiAmt.value)||0;

nums.forEach(n=>{
if(n.length==1) n="0"+n;
data[n]=amt;
});

update();
}

// 🔴 CROSSING
function generateCross(){

let a = n1.value.trim();
let b = n2.value.trim();
let amt = Number(crossAmt.value)||0;
let noJodi = nojodi.checked;

for(let i of a){
for(let j of b){

if(noJodi && i===j) continue;

let num = i+j;
data[num]=amt;

}}

update();
}

// 🔥 UPDATE EVERYTHING
function update(){

let total=0;

for(let i in data){
let el = document.querySelector("#b"+i+" .val");
if(el){
el.innerText = data[i];
total += data[i];
}
}

document.getElementById("total").innerText = total;
}

</script>

</body>
</html>
