<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family:Arial;
  background:#f2f4f8;
  padding:10px;
}

/* 00–99 */
.grid99{
  display:grid;
  grid-template-columns: repeat(10,1fr);
  gap:5px;
  margin-bottom:10px;
}

/* BOX */
.box{
  background:#fff;
  border-radius:6px;
  padding:5px;
  text-align:center;
  font-size:12px;
}

.box .val{
  margin-top:3px;
  font-weight:bold;
}

/* SECTION */
.section{
  background:#fff;
  padding:10px;
  border-radius:8px;
  margin-bottom:10px;
}

/* INPUT */
input{
  width:100%;
  padding:8px;
  margin-top:5px;
  box-sizing:border-box;
  border-radius:6px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:10px;
  margin-top:10px;
  background:green;
  color:#fff;
  border:none;
  border-radius:6px;
}

/* A/B GRID */
.abRow{
  display:grid;
  grid-template-columns: repeat(10,1fr);
  gap:5px;
}

/* TOTAL */
.total{
  font-size:18px;
  font-weight:bold;
  margin-top:10px;
}
</style>
</head>

<body>

<!-- 🔥 00–99 -->
<h3>00 - 99</h3>
<div class="grid99" id="panel"></div>

<!-- 🔵 A/B GRID -->
<div class="section">
<h3>A (0–9)</h3>
<div id="aBox" class="abRow"></div>

<h3>B (0–9)</h3>
<div id="bBox" class="abRow"></div>

<div class="total">Total: ₹<span id="total">0</span></div>
</div>

<!-- 🟡 JODI -->
<div class="section">
<h3>JODI INPUT</h3>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
<div>
<div style="font-size:10px;color:#666;">INPUT</div>
<input id="jodiNums" placeholder="12 34 56">
</div>

<div>
<div style="font-size:10px;color:#666;">AMOUNT</div>
<input id="jodiAmt" type="number" placeholder="₹">
</div>
</div>

<button onclick="addJodi()">ADD JODI</button>
</div>

<!-- 🔴 CROSSING -->
<div class="section">
<h3>CROSSING</h3>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
<div>
<div style="font-size:10px;color:#666;">NUMBER 1</div>
<input id="n1" placeholder="123">
</div>

<div>
<div style="font-size:10px;color:#666;">NUMBER 2</div>
<input id="n2" placeholder="456">
</div>
</div>

<div style="margin-top:8px;">
<label><input type="checkbox" id="nojodi"> WITHOUT JODI</label>
</div>

<div style="margin-top:8px;">
<div style="font-size:10px;color:#666;">AMOUNT</div>
<input id="crossAmt" type="number" placeholder="₹">
</div>

<button onclick="generateCross()">GENERATE CROSS</button>
</div>

<!-- 🟢 A INPUT -->
<div class="section">
<h3>A INPUT</h3>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
<div>
<div style="font-size:10px;color:#666;">NUMBER</div>
<input id="aNums" placeholder="1 2 3">
</div>

<div>
<div style="font-size:10px;color:#666;">AMOUNT</div>
<input id="aAmt" type="number" placeholder="₹">
</div>
</div>

<button onclick="addAInput()">ADD A</button>
</div>

<!-- 🔵 B INPUT -->
<div class="section">
<h3>B INPUT</h3>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
<div>
<div style="font-size:10px;color:#666;">NUMBER</div>
<input id="bNums" placeholder="1 2 3">
</div>

<div>
<div style="font-size:10px;color:#666;">AMOUNT</div>
<input id="bAmt" type="number" placeholder="₹">
</div>
</div>

<button onclick="addBInput()">ADD B</button>
</div>

<script>

let data = {};

// 🔥 00–99
for(let i=0;i<100;i++){
let num=i.toString().padStart(2,'0');

panel.innerHTML+=`
<div class="box" id="b${num}">
${num}
<div class="val">0</div>
</div>`;
}

// 🔵 A/B GRID
for(let i=0;i<10;i++){

aBox.innerHTML+=`
<div class="box">
A ${i}
<input oninput="setVal('A'+${i},this.value)">
</div>`;

bBox.innerHTML+=`
<div class="box">
B ${i}
<input oninput="setVal('B'+${i},this.value)">
</div>`;
}

// 🔵 SET
function setVal(num,val){
data[num]=Number(val)||0;
update();
}

// 🟡 AUTO JODI FORMAT
jodiNums.addEventListener("input",function(){
let v=this.value.replace(/\D/g,'');
this.value=(v.match(/.{1,2}/g)||[]).join(" ");
});

// 🟡 JODI ADD
function addJodi(){

let nums=jodiNums.value.trim().split(" ");
let amt=Number(jodiAmt.value)||0;

nums.forEach(n=>{
if(n.length==1)n="0"+n;
data[n]=amt;
});

update();

jodiNums.value="";
jodiAmt.value="";
}

// 🔴 CROSSING
function generateCross(){

let a=n1.value.trim();
let b=n2.value.trim();
let amt=Number(crossAmt.value)||0;
let noJodi=nojodi.checked;

for(let i of a){
for(let j of b){

if(noJodi && i===j)continue;

data[i+j]=amt;

}}

update();

n1.value="";
n2.value="";
crossAmt.value="";
nojodi.checked=false;
}

// 🟢 A INPUT
aNums.addEventListener("input",function(){
let v=this.value.replace(/\D/g,'');
this.value=v.split("").join(" ");
});

function addAInput(){

let nums=aNums.value.trim().split(" ");
let amt=Number(aAmt.value)||0;

nums.forEach(n=>{
data["A"+n]=amt;
});

update();

aNums.value="";
aAmt.value="";
}

// 🔵 B INPUT
bNums.addEventListener("input",function(){
let v=this.value.replace(/\D/g,'');
this.value=v.split("").join(" ");
});

function addBInput(){

let nums=bNums.value.trim().split(" ");
let amt=Number(bAmt.value)||0;

nums.forEach(n=>{
data["B"+n]=amt;
});

update();

bNums.value="";
bAmt.value="";
}

// 🔥 UPDATE SYSTEM
function update(){

let total=0;

for(let i in data){
let el=document.querySelector("#b"+i+" .val");
if(el){
el.innerText=data[i];
total+=data[i];
}
}

document.getElementById("total").innerText=total;
}

</script>

</body>
</html>
