<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family:Arial;
  background:#f2f4f8;
  padding:10px;
}

/* 00–99 GRID */
.grid99{
  display:grid;
  grid-template-columns: repeat(10,1fr);
  gap:5px;
  margin-bottom:10px;
}

.box{
  background:#fff;
  border-radius:6px;
  padding:5px;
  text-align:center;
  font-size:12px;
}

.box .val{
  margin-top:3px;
  font-weight:bold;
}

/* SECTION */
.section{
  background:#fff;
  padding:10px;
  border-radius:8px;
  margin-bottom:10px;
}

/* INPUT */
input{
  width:100%;
  padding:8px;
  margin-top:5px;
  box-sizing:border-box;
  border-radius:6px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:10px;
  margin-top:10px;
  background:green;
  color:#fff;
  border:none;
  border-radius:6px;
}

/* A/B GRID */
.abRow{
  display:grid;
  grid-template-columns: repeat(10,1fr);
  gap:5px;
}

/* TOTAL */
.total{
  font-size:18px;
  font-weight:bold;
  margin-top:10px;
}
</style>
</head>

<body>

<h3>00 - 99</h3>
<div class="grid99" id="panel"></div>

<!-- A/B -->
<div class="section">
<h3>A (0–9)</h3>
<div id="aBox" class="abRow"></div>

<h3>B (0–9)</h3>
<div id="bBox" class="abRow"></div>

<div class="total">Total: ₹<span id="total">0</span></div>
</div>

<!-- JODI -->
<div class="section">
<h3>JODI INPUT</h3>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
<input id="jodiNums" placeholder="12 34 56">
<input id="jodiAmt" type="number" placeholder="₹">
</div>

<button onclick="addJodi()">ADD JODI</button>
</div>

<!-- CROSSING -->
<div class="section">
<h3>CROSSING</h3>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
<input id="n1" placeholder="123">
<input id="n2" placeholder="456">
</div>

<label><input type="checkbox" id="nojodi"> WITHOUT JODI</label>

<input id="crossAmt" type="number" placeholder="₹">
<button onclick="generateCross()">GENERATE CROSS</button>
</div>

<!-- A INPUT -->
<div class="section">
<h3>A INPUT</h3>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
<input id="aNums" placeholder="1 2 3">
<input id="aAmt" type="number" placeholder="₹">
</div>

<button onclick="addA()">ADD A</button>
</div>

<!-- B INPUT -->
<div class="section">
<h3>B INPUT</h3>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
<input id="bNums" placeholder="1 2 3">
<input id="bAmt" type="number" placeholder="₹">
</div>

<button onclick="addB()">ADD B</button>
</div>

<script>

let data = {};

// 🔥 00–99 GRID
for(let i=0;i<100;i++){
let num = i.toString().padStart(2,'0');

panel.innerHTML += `
<div class="box" id="b${num}">
${num}
<div class="val">0</div>
</div>`;
}

// A/B GRID
for(let i=0;i<10;i++){

aBox.innerHTML += `
<div class="box">
A ${i}
<input oninput="setVal('A'+${i},this.value)">
</div>`;

bBox.innerHTML += `
<div class="box">
B ${i}
<input oninput="setVal('B'+${i},this.value)">
</div>`;
}

// 🔵 SET VALUE (overwrite for manual grid)
function setVal(k,v){
data[k]=Number(v)||0;
update();
}

// 🟡 JODI ADD (FIXED ADD SYSTEM)
function addJodi(){

let nums=jodiNums.value.trim().split(" ");
let amt=Number(jodiAmt.value)||0;

nums.forEach(n=>{
if(n.length==1)n="0"+n;
data[n]=(data[n]||0)+amt;   // ✔ ADD FIX
});

jodiNums.value="";
jodiAmt.value="";
update();
}

// 🔴 CROSSING (FIXED ADD SYSTEM)
function generateCross(){

let a=n1.value.trim();
let b=n2.value.trim();
let amt=Number(crossAmt.value)||0;
let no=nojodi.checked;

for(let i of a){
for(let j of b){

if(no && i===j)continue;

let key=i+j;
data[key]=(data[key]||0)+amt;   // ✔ ADD FIX

}}

n1.value="";
n2.value="";
crossAmt.value="";
nojodi.checked=false;

update();
}

// 🟢 A INPUT (FIXED ADD SYSTEM)
function addA(){

let nums=aNums.value.trim().split(" ");
let amt=Number(aAmt.value)||0;

nums.forEach(n=>{
let key="A"+(Number(n)-1);
if(Number(n)===0) key="A9";

data[key]=(data[key]||0)+amt;   // ✔ ADD FIX
});

aNums.value="";
aAmt.value="";
update();
}

// 🔵 B INPUT (FIXED ADD SYSTEM)
function addB(){

let nums=bNums.value.trim().split(" ");
let amt=Number(bAmt.value)||0;

nums.forEach(n=>{
let key="B"+(Number(n)-1);
if(Number(n)===0) key="B9";

data[key]=(data[key]||0)+amt;   // ✔ ADD FIX
});

bNums.value="";
bAmt.value="";
update();
}

// 🔥 UPDATE SYSTEM
function update(){

let total=0;

for(let i in data){
let el=document.querySelector("#b"+i+" .val");
if(el){
el.innerText=data[i];
total+=data[i];
}
}

document.getElementById("total").innerText=total;
}

</script>

</body>
</html>
