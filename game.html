<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family:Arial;
  background:#f2f4f8;
  padding:10px;
}

.grid99{
  display:grid;
  grid-template-columns: repeat(10,1fr);
  gap:5px;
  margin-bottom:10px;
}

.abRow{
  display:grid;
  grid-template-columns: repeat(10,1fr);
  gap:5px;
}

.box{
  background:#fff;
  border-radius:6px;
  padding:5px;
  text-align:center;
  font-size:12px;
}

.val{
  font-weight:bold;
  margin-top:3px;
}

.section{
  background:#fff;
  padding:10px;
  border-radius:8px;
  margin-bottom:10px;
}

input{
  width:100%;
  padding:8px;
  margin-top:5px;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:10px;
  margin-top:10px;
  background:green;
  color:#fff;
  border:none;
  border-radius:6px;
}

.total{
  font-size:18px;
  font-weight:bold;
}
</style>
</head>

<body>

<h3>00 - 99</h3>
<div class="grid99" id="grid"></div>

<div class="section">
<h3>A (0–9)</h3>
<div id="aBox" class="abRow"></div>

<h3>B (0–9)</h3>
<div id="bBox" class="abRow"></div>

<div class="total">Total: ₹<span id="total">0</span></div>
</div>

<script>

let data = {};

// 🔥 00–99 GRID
for(let i=0;i<100;i++){
let n=i.toString().padStart(2,'0');

grid.innerHTML+=`
<div class="box" id="n${n}">
${n}
<div class="val">0</div>
</div>`;
}

// 🔵 A/B GRID (SEPARATE STORAGE)
for(let i=0;i<10;i++){

aBox.innerHTML+=`
<div class="box">
A${i}
<div class="val" id="A${i}">0</div>
<input oninput="setAB('A'+${i},this.value)">
</div>`;

bBox.innerHTML+=`
<div class="box">
B${i}
<div class="val" id="B${i}">0</div>
<input oninput="setAB('B'+${i},this.value)">
</div>`;
}

// 🔵 A/B SET
function setAB(k,v){
data[k]=Number(v)||0;
update();
}

// 🔥 JODI / CROSS / ETC (SAME LOGIC)
function update(){

let total=0;

// A/B SHOW FIX ✔
for(let i=0;i<10;i++){

let av=data["A"+i]||0;
let bv=data["B"+i]||0;

document.getElementById("A"+i).innerText=av;
document.getElementById("B"+i).innerText=bv;
}

// TOTAL ONLY A/B
for(let i in data){
total+=data[i];
}

document.getElementById("total").innerText=total;
}

</script>

</body>
</html>
